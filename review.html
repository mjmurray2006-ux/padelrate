<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0e;--surface:#161616;--surface2:#1e1e1e;--border:#2a2a2a;--accent:#c8f135;--accent-dim:#a8d020;--text:#f0f0f0;--muted:#888;--tag-bg:#252525}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
nav{display:flex;align-items:center;justify-content:space-between;padding:18px 40px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(14,14,14,0.95);backdrop-filter:blur(8px);z-index:100}
.logo{font-size:1.4rem;font-weight:800;letter-spacing:-0.5px;text-decoration:none;color:var(--text)}
.logo span{color:var(--accent)}
.nav-links{display:flex;gap:28px;font-size:0.88rem}
.nav-links a{color:var(--muted);text-decoration:none;transition:color 0.2s}
.nav-links a:hover{color:var(--text)}
.breadcrumb{padding:20px 40px 0;font-size:0.8rem;color:var(--muted)}
.breadcrumb a{color:var(--muted);text-decoration:none}
.breadcrumb a:hover{color:var(--accent)}
.breadcrumb span{margin:0 8px}
.back-link{display:inline-flex;align-items:center;gap:6px;color:var(--muted);text-decoration:none;font-size:0.82rem;margin-bottom:24px;transition:color 0.2s}
.back-link:hover{color:var(--accent)}
.review-layout{display:grid;grid-template-columns:1fr 340px;gap:40px;padding:32px 40px 60px;max-width:1200px;margin:0 auto}
.racket-header{display:flex;align-items:flex-start;gap:24px;margin-bottom:32px}
.racket-img-wrap{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;display:flex;align-items:center;justify-content:center;width:190px;height:190px;flex-shrink:0}
.racket-img-wrap img{max-width:100%;max-height:150px;object-fit:contain}
.racket-brand-tag{font-size:0.75rem;color:var(--accent);font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.racket-title{font-size:2rem;font-weight:800;letter-spacing:-0.5px;line-height:1.1;margin-bottom:10px}
.racket-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.tag{background:var(--tag-bg);border:1px solid var(--border);font-size:0.72rem;color:var(--muted);padding:3px 9px;border-radius:20px}
.racket-summary{font-size:0.97rem;color:var(--muted);line-height:1.7;max-width:520px}
.score-banner{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.score-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;flex:1;min-width:90px;text-align:center}
.score-box .val{font-size:2rem;font-weight:800;color:var(--accent)}
.score-box.overall .val{font-size:2.6rem}
.score-box .lbl{font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.8px;margin-top:4px}
.stats-section{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;margin-bottom:24px}
.stats-section h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:16px}
.stat-row{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.stat-label{font-size:0.78rem;color:var(--muted);width:65px;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.stat-track{flex:1;height:7px;background:var(--border);border-radius:99px;overflow:hidden}
.stat-fill{height:100%;background:var(--accent);border-radius:99px}
.stat-val{font-size:0.88rem;font-weight:700;width:28px;text-align:right}
.pros-cons{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px}

.pros h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:#7ee89a;margin-bottom:12px}

.cons li::before{content:"✗";position:absolute;left:0;color:#ff6b6b;font-weight:700}
.verdict{background:var(--surface2);border:1px solid var(--border);border-left:3px solid var(--accent);border-radius:12px;padding:22px;margin-bottom:24px}
.verdict h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:1px;color:var(--accent);margin-bottom:10px}

.specs-table{width:100%;border-collapse:collapse;font-size:0.86rem;margin-bottom:24px}
.specs-table tr{border-bottom:1px solid var(--border)}
.specs-table td{padding:10px 0;color:var(--muted)}
.specs-table td:first-child{color:var(--text);font-weight:600;width:40%}
.buy-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:22px;position:sticky;top:90px}
.buy-box-price{font-size:1.9rem;font-weight:800;margin-bottom:3px}
.buy-box-orig{font-size:0.88rem;color:var(--muted);text-decoration:line-through;margin-bottom:16px}
.btn{background:var(--accent);color:#000;border:none;padding:12px 16px;border-radius:6px;font-size:0.88rem;font-weight:700;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;gap:5px;transition:background 0.2s;width:100%;margin-bottom:10px}

.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.buy-box-note{font-size:0.73rem;color:var(--muted);text-align:center;line-height:1.5;margin-bottom:16px}
.sidebar-divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.sidebar-label{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.8px;color:var(--muted);margin-bottom:10px}
.mini-stat{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.mini-label{font-size:0.73rem;color:var(--muted);width:52px}
.mini-track{flex:1;height:4px;background:var(--border);border-radius:99px;overflow:hidden}
.mini-fill{height:100%;background:var(--accent);border-radius:99px}

.spec-mini{font-size:0.8rem;color:var(--muted);line-height:2.2}

footer{border-top:1px solid var(--border);padding:28px 40px;display:flex;justify-content:space-between;align-items:center;font-size:0.8rem;color:var(--muted)}
footer a{color:var(--muted);text-decoration:none}
footer a:hover{color:var(--text)}
@media(max-width:768px){.review-layout{grid-template-columns:1fr}.racket-header{flex-direction:column}.pros-cons{grid-template-columns:1fr}nav,.breadcrumb,.review-layout,footer{padding-left:18px;padding-right:18px}}
</style>
