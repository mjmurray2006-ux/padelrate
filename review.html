          "<div class=\"bar-row\"><div class=\"bar-name\">Control</div><div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:" + racket.control + "%\"></div></div><div class=\"bar-val\">" + racket.control + "</div></div>" +
          "<div class=\"bar-row\"><div class=\"bar-name\">Touch</div><div class=\"bar-track\"><div class=\"bar-fill\" style=\"width:" + racket.touch + "%\"></div></div><div class=\"bar-val\">" + racket.touch + "</div></div>" +
        "</div>" +
        "<a class=\"buy-btn\" href=\"" + racket.affiliateUrl + "\" target=\"_blank\" rel=\"noopener\">Buy &mdash; from &#163;" + racket.price + " &#8594;</a>" +
      "</div>" +
    "</div>";

  const fullReviewHTML = racket.fullReview
    ? "<div class=\"review-section\"><h2>Full Review</h2><div class=\"full-review-text\">" +
        racket.fullReview.map(function(p){ return "<p>" + p + "</p>"; }).join("") +
      "</div></div>"
    : "";

  const prosHTML = racket.pros.map(function(p){ return "<li>" + p + "</li>"; }).join("");
  const consHTML = racket.cons.map(function(c){ return "<li>" + c + "</li>"; }).join("");

  document.getElementById("reviewBody").innerHTML =
    "<div class=\"review-body\">" +
      "<div class=\"review-main\">" +
        "<div class=\"review-section\"><h2>Verdict</h2><p class=\"verdict-text\">" + racket.verdict + "</p></div>" +
        fullReviewHTML +
        "<div class=\"review-section\"><h2>Pros &amp; Cons</h2><div class=\"pros-cons\"><div class=\"pros\"><h3>Pros</h3><ul>" + prosHTML + "</ul></div><div class=\"cons\"><h3>Cons</h3><ul>" + consHTML + "</ul></div></div></div>" +
        "<div class=\"review-section\"><h2>Best For</h2><p class=\"best-for-text\">" + racket.bestFor + "</p></div>" +
      "</div>" +
      "<div class=\"specs-box\">" +
        "<h2>Specifications</h2>" +
        "<div class=\"spec-row\"><span class=\"spec-label\">Brand</span><span class=\"spec-val\">" + racket.brand + "</span></div>" +
        "<div class=\"spec-row\"><span class=\"spec-label\">Shape</span><span class=\"spec-val\">" + racket.shape + "</span></div>" +
        "<div class=\"spec-row\"><span class=\"spec-label\">Level</span><span class=\"spec-val\">" + racket.level + "</span></div>" +
        "<div class=\"spec-row\"><span class=\"spec-label\">Weight</span><span class=\"spec-val\">" + racket.weight + "</span></div>" +
        "<div class=\"spec-row\"><span class=\"spec-label\">Balance</span><span class=\"spec-val\">" + racket.balance + "</span></div>" +
        "<div class=\"spec-row\"><span class=\"spec-label\">Core</span><span class=\"spec-val\">" + racket.core + "</span></div>" +
        "<div class=\"spec-row\"><span class=\"spec-label\">Price</span><span class=\"spec-val\">from &#163;" + racket.price + "</span></div>" +
      "</div>" +
    "</div>";
}

document.getElementById("hamburger").addEventListener("click",function(){
  this.classList.toggle("open");
  document.getElementById("navMenu").classList.toggle("open");
});
document.querySelectorAll("#navMenu a").forEach(function(link){
  link.addEventListener("click",function(){
    document.getElementById("hamburger").classList.remove("open");
    document.getElementById("navMenu").classList.remove("open");
  });
});
